name: Build Test

on:
  push: {}
  pull_request:
    branches: [ main, master, stage ]
  workflow_dispatch:

jobs:
  define-matrix:
    if: false
    runs-on: ubuntu-latest

    outputs:
      jobs: ${{ steps.jobs.outputs.jobs }}

    steps:
      - name: Define Colors
        id: jobs
        run: |
          echo 'jobs=["red", "green", "blue"]' >> "$GITHUB_OUTPUT"

  packages:
    name: Built Common Packages
    strategy:
      fail-fast: false
      matrix:
        include:
        - runner: ubuntu-latest
          config: x86_64-linux.packages
        - runner: macos-latest
          config: aarch64-darwin.packages
    runs-on: ${{ matrix.runner }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Install Nix
      uses: cachix/install-nix-action@v31
      with:
        github_access_token: ${{ secrets.GITHUB_TOKEN }}
        nix_path: nixpkgs=channel:nixos-unstable
        extra_nix_config: |
          experimental-features = nix-command flakes pipe-operators

    - name: Setup Cachix
      uses: cachix/cachix-action@v16
      with:
        name: undefined01
        authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
        extraPullNames: nix-community

    - name: Build Common Packages for ${{ matrix.config }}
      run: |
        nix config show
        echo "Moving user nix settings (set by cachix) to system settings to bypass the issue of nix-eval-jobs"
        echo "substituters = $(nix config show substituters)" | sudo tee -a /etc/nix/nix.conf
        echo "trusted-public-keys = $(nix config show trusted-public-keys)" | sudo tee -a /etc/nix/nix.conf
        cat /etc/nix/nix.conf
        nix config show
        df -h
        free -h || memory_pressure
        nix run nixpkgs#nix-eval-jobs -- --flake .#packages.x86_64-linux.darwinPkgs.sparkle --check-cache-status
        nix run nixpkgs#nix-fast-build -- --no-nom --skip-cached --max-jobs 1 --eval-workers 1 --no-link --flake .#checks.${{ matrix.config }}

  configurations:
    name: Build Configurations
    needs: packages
    strategy:
      fail-fast: false
      matrix:
        include:
        - runner: ubuntu-latest
          prefix: nixosConfigurations
          config: work
          suffix: config.system.build.toplevel
        - runner: ubuntu-latest
          prefix: nixosConfigurations
          config: wsl
          suffix: config.system.build.toplevel
        - runner: ubuntu-latest
          prefix: nixosConfigurations
          config: iso
          suffix: config.system.build.toplevel
        - runner: macos-latest
          prefix: darwinConfigurations
          config: darwin
          suffix: system
        - runner: ubuntu-latest
          prefix: homeConfigurations
          config: docker
          suffix: activationPackage
    runs-on: ${{ matrix.runner }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Install Nix
      uses: cachix/install-nix-action@v31
      with:
        github_access_token: ${{ secrets.GITHUB_TOKEN }}
        nix_path: nixpkgs=channel:nixos-unstable
        extra_nix_config: |
          experimental-features = nix-command flakes pipe-operators

    - name: Setup Cachix
      uses: cachix/cachix-action@v16
      with:
        name: undefined01
        authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
        extraPullNames: nix-community

    - name: Build ${{ matrix.prefix }}.${{ matrix.config }}
      run: |
        nix config show
        echo "-----------------------------------------------"
        cat /etc/nix/nix.conf
        echo "Moving user nix settings (set by cachix) to system settings to bypass the issue of nix-eval-jobs"
        echo "substituters = $(nix config show substituters)" | sudo tee -a /etc/nix/nix.conf
        echo "trusted-public-keys = $(nix config show trusted-public-keys)" | sudo tee -a /etc/nix/nix.conf
        cat /etc/nix/nix.conf
        echo "-----------------------------------------------"
        nix config show
        df -h
        free -h || memory_pressure
        nix run nixpkgs#nix-fast-build -- --no-nom --skip-cached --max-jobs 1 --eval-workers 1 --no-link --flake .#${{ matrix.prefix }}.${{ matrix.config }}.${{ matrix.suffix }}

  check-flake:
    name: Check Flake
    runs-on: ubuntu-latest
    if: false

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Install Nix
      uses: cachix/install-nix-action@v31
      with:
        github_access_token: ${{ secrets.GITHUB_TOKEN }}
        nix_path: nixpkgs=channel:nixos-unstable
        extra_nix_config: |
          experimental-features = nix-command flakes pipe-operators

    - name: Check flake
      run: |
        nix flake check --no-build --all-systems

    - name: Show flake info
      run: |
        nix flake show

  format-check:
    name: Format Check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Install Nix
      uses: cachix/install-nix-action@v31
      with:
        github_access_token: ${{ secrets.GITHUB_TOKEN }}
        nix_path: nixpkgs=channel:nixos-unstable
        extra_nix_config: |
          experimental-features = nix-command flakes pipe-operators

    - name: Check formatting
      run: |
        nix fmt -- --ci .
