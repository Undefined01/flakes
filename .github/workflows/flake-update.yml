name: Flake Update

on:
  schedule:
    - cron: '0 1 * * *'
  push:
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: flake-update-bot-dev-lock
  cancel-in-progress: true

env:
  SOURCE_BRANCH: dev
  TARGET_BRANCH: bot/dev-lock

jobs:
  update-lock:
    name: Update bot/dev-lock
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dev
        uses: actions/checkout@v6
        with:
          ref: ${{ env.SOURCE_BRANCH }}
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes pipe-operators

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Prepare bot/dev-lock
        run: |
          set -euo pipefail

          git fetch --no-tags origin "${SOURCE_BRANCH}"

          if git ls-remote --exit-code --heads origin "${TARGET_BRANCH}" >/dev/null 2>&1; then
            git fetch --no-tags origin "${TARGET_BRANCH}"
            git switch -C "${TARGET_BRANCH}" "origin/${TARGET_BRANCH}"
          else
            git switch -C "${TARGET_BRANCH}" "origin/${SOURCE_BRANCH}"
          fi

          git merge --no-ff --no-edit -m "bot: merge ${SOURCE_BRANCH} into ${TARGET_BRANCH}" "origin/${SOURCE_BRANCH}" || {
            echo "Merge from ${SOURCE_BRANCH} into ${TARGET_BRANCH} failed"
            exit 1
          }

      - name: Update flake.lock
        run: |
          set -euo pipefail

          nix flake update

          if git diff --quiet -- flake.lock; then
            echo "flake.lock is already up to date"
            exit 0
          fi

          git add flake.lock
          git commit -m "bot: nix flake update"

      - name: Prefer PAT for push-triggered workflows
        env:
          BOT_PUSH_TOKEN: ${{ secrets.BOT_PUSH_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${BOT_PUSH_TOKEN}" ]; then
            echo "BOT_PUSH_TOKEN is not set; using GITHUB_TOKEN"
            exit 0
          fi

          git remote set-url origin "https://x-access-token:${BOT_PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

      - name: Push bot/dev-lock
        run: |
          set -euo pipefail
          git push origin "HEAD:${TARGET_BRANCH}"
